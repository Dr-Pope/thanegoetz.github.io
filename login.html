<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Starbase 451 secure terminal — authorized personnel only.">
  <title>STATION 451 :: AUTHORIZATION REQUIRED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #080808;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
    }

    /* ── Terminal window ── */
    #term-wrap {
      position: relative;
      width: calc(100% - 24px);
      max-width: 680px;
      height: calc(100vh - 24px);
      max-height: 860px;
      display: flex;
      flex-direction: column;
      background: #000;
      border: 1px solid #1a3a1a;
      box-shadow:
        0 0 0 1px #000,
        0 0 30px rgba(0,200,60,0.15),
        0 0 80px rgba(0,200,60,0.06),
        inset 0 0 80px rgba(0,0,0,0.5);
    }

    /* CRT scanlines */
    #term-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* CRT vignette */
    #term-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
      pointer-events: none;
      z-index: 11;
    }

    /* ── Title bar ── */
    #term-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #050f05;
      border-bottom: 1px solid #1a3a1a;
      padding: 7px 12px;
      flex-shrink: 0;
      user-select: none;
    }
    .tb-dots { display: flex; gap: 6px; align-items: center; }
    .tb-dot {
      width: 11px; height: 11px; border-radius: 50%; display: inline-block;
    }
    .tb-dot-r { background: #ff5f56; }
    .tb-dot-y { background: #ffbd2e; }
    .tb-dot-g { background: #27c93f; }
    .tb-title {
      flex: 1;
      text-align: center;
      color: #2a5a2a;
      font-size: 11px;
      letter-spacing: 2px;
    }
    .tb-conn { color: #2a5a2a; font-size: 10px; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
    .tb-dot-blink { color: #00ff44; animation: blink 1.2s step-start infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Terminal body ── */
    #term-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px 12px;
      scrollbar-width: thin;
      scrollbar-color: #1a3a1a #000;
    }
    #term-body::-webkit-scrollbar { width: 4px; }
    #term-body::-webkit-scrollbar-track { background: #000; }
    #term-body::-webkit-scrollbar-thumb { background: #1a3a1a; }

    /* ── Text classes ── */
    .ln     { line-height: 1.55; min-height: 1em; font-size: 13px; text-shadow: 0 0 5px currentColor; }
    .dim    { color: #1a3a1a; }
    .ok     { color: #00aa33; }
    .warn   { color: #ffaa00; }
    .alert  { color: #ff4444; font-weight: bold; }
    .title  { color: #00ff99; font-family: 'VT323', monospace; font-size: 30px; letter-spacing: 3px; line-height: 1.2; }
    .sub    { color: #6699ff; font-size: 12px; letter-spacing: 2px; }
    .normal { color: #00cc44; }
    .g-ok     { color: #00cc44; line-height: 1.6; font-size: 13px; }
    .g-bright { color: #00ff99; font-family: 'VT323', monospace; font-size: 26px; letter-spacing: 2px; line-height: 1.4; }
    .g-yellow { color: #ffff00; font-family: 'VT323', monospace; font-size: 26px; letter-spacing: 2px; line-height: 1.4; }
    .g-dim    { color: #1a3a1a; line-height: 1.6; font-size: 13px; }

    /* ── Progress bar ── */
    .prog-wrap {
      margin-top: 10px;
      background: #001208;
      border: 1px solid #005515;
      height: 10px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      background: #00cc44;
      width: 0;
      transition: width 1.2s ease-out;
    }

    /* ── Input line ── */
    #input-line {
      display: none;
      align-items: baseline;
      font-size: 13px;
      margin-top: 2px;
      line-height: 1.55;
    }
    #prompt-text {
      color: #00cc44;
      white-space: pre;
      text-shadow: 0 0 5px #00cc44;
      flex-shrink: 0;
    }
    #typed-display {
      color: #00ff99;
      text-shadow: 0 0 5px #00ff99;
      word-break: break-all;
    }
    .cur {
      color: #00cc44;
      animation: blink 0.8s step-start infinite;
      text-shadow: 0 0 8px #00cc44;
      margin-left: 1px;
    }

    /* ── Hidden real input ── */
    #ti {
      position: fixed;
      top: -300px;
      left: -300px;
      width: 1px;
      height: 1px;
      opacity: 0;
      border: none;
      outline: none;
      background: transparent;
      color: transparent;
      caret-color: transparent;
      font-size: 1px;
    }
  </style>
</head>
<body>

<div id="term-wrap">
  <div id="term-bar">
    <span class="tb-dots">
      <span class="tb-dot tb-dot-r"></span>
      <span class="tb-dot tb-dot-y"></span>
      <span class="tb-dot tb-dot-g"></span>
    </span>
    <span class="tb-title">STATION 451 · DEEP SPACE TERMINAL · v2.1</span>
    <span class="tb-conn"><span class="tb-dot-blink">●</span> CONNECTED</span>
  </div>
  <div id="term-body">
    <div id="boot-log"></div>
    <div id="input-line">
      <span id="prompt-text"></span><span id="typed-display"></span><span class="cur">█</span>
    </div>
  </div>
</div>

<!-- Hidden real input that captures all keystrokes -->
<input id="ti" type="text" autocomplete="off" spellcheck="false" maxlength="60">

<script>
var RANKS = [
  'CADET', 'ENSIGN', 'LIEUTENANT', 'SCIENCE OFFICER',
  'NAVIGATOR', 'ENGINEER', 'PILOT', 'XENOBIOLOGIST',
  'MEDICAL OFFICER', 'TACTICAL OFFICER', 'COMMS SPECIALIST'
];

// Already logged in — skip to station
if (localStorage.getItem('xb_username')) {
  window.location.replace('index.html');
}

var LINES = [
  { t: 'STATION 451  ·  DEEP SPACE TERMINAL  ·  v2.1', c: 'title', d: 50 },
  { t: '─────────────────────────────────────────────────────', c: 'dim', d: 60 },
  { t: '> SYS: XenoCore BIOS 2.1.4 .................. [OK]', c: 'ok', d: 80 },
  { t: '> MEM: 640K BASE + 384K EXTENDED ............ [OK]', c: 'ok', d: 80 },
  { t: '> VID: VGA 640x480 .......................... [OK]', c: 'ok', d: 80 },
  { t: '> DISK: STAR CHARTS & NAV DATABASE .......... [OK]', c: 'ok', d: 80 },
  { t: '> NET: SECTOR 7-GAMMA RELAY LINK ............ [OK]', c: 'ok', d: 90 },
  { t: '> SEC: XENOSHIELD FIREWALL v3 ........... [ACTIVE]', c: 'warn', d: 110 },
  { t: '─────────────────────────────────────────────────────', c: 'dim', d: 60 },
  { t: '', c: '', d: 40 },
  { t: '   STATION 451', c: 'title', d: 200 },
  { t: '   Science Officer Thane\'s Deep Space Terminal', c: 'sub', d: 100 },
  { t: '   EST. 2025  ·  SECTOR 7-GAMMA  ·  QUADRANT OMEGA', c: 'dim', d: 80 },
  { t: '', c: '', d: 40 },
  { t: '─────────────────────────────────────────────────────', c: 'dim', d: 60 },
  { t: '!! VISITOR DETECTED — AUTHORIZATION REQUIRED !!', c: 'alert', d: 260 },
  { t: '', c: '', d: 40 },
  { t: '  This terminal is restricted to authorized personnel.', c: 'normal', d: 90 },
  { t: '  Identify yourself to receive station clearance.', c: 'normal', d: 90 },
  { t: '  Your designation will be logged in the starlog.', c: 'normal', d: 90 },

  { t: '  PS: Use the help command for assistance.', c: 'normal', d: 90 },

  { t: '', c: '', d: 40 },
  { t: '─────────────────────────────────────────────────────', c: 'dim', d: 60 },
];

var log  = document.getElementById('boot-log');
var il   = document.getElementById('input-line');
var ti   = document.getElementById('ti');
var li   = 0;

var loginState     = 'booting'; // 'booting' | 'username' | 'password' | 'done'
var enteredUsername = '';

// ── Scroll helper ────────────────────────────────────────────
function scrollBottom() {
  var tb = document.getElementById('term-body');
  tb.scrollTop = tb.scrollHeight;
}

// ── Line helpers ─────────────────────────────────────────────
function addLine(text, cls) {
  var el = document.createElement('div');
  el.className = 'ln ' + (cls || 'ok');
  el.textContent = text;
  log.appendChild(el);
  scrollBottom();
  return el;
}
function tmpLine(text, cls, ms) {
  var el = addLine(text, cls);
  el.style.fontStyle = 'italic';
  setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, ms || 2500);
}
function seqLines(arr, baseDelay) {
  var d = 0;
  arr.forEach(function (l) {
    d += l.d || (baseDelay || 220);
    setTimeout(function () { addLine(l.t, l.c || 'ok'); }, d);
  });
  setTimeout(function () { ti.focus(); }, d + 50);
  return d;
}

// ── Boot sequence ────────────────────────────────────────────
function nextLine() {
  if (li >= LINES.length) {
    loginState = 'username';
    showPrompt('station451 login: ');
    return;
  }
  var l = LINES[li++];
  var el = document.createElement('div');
  el.className = 'ln ' + l.c;
  el.textContent = l.t;
  log.appendChild(el);
  scrollBottom();
  setTimeout(nextLine, l.d || 80);
}

setTimeout(nextLine, 400);

// ── Prompt display ───────────────────────────────────────────
function showPrompt(label) {
  document.getElementById('prompt-text').textContent = label;
  document.getElementById('typed-display').textContent = '';
  il.style.display = 'flex';
  ti.value = '';
  ti.focus();
  scrollBottom();
}

// ── Input sync ───────────────────────────────────────────────
ti.addEventListener('input', function () {
  if (loginState === 'username') {
    document.getElementById('typed-display').textContent = this.value;
    checkUsernameEaster(this.value.toLowerCase().trim());
  } else if (loginState === 'password') {
    document.getElementById('typed-display').textContent = '';
    checkPasswordEaster(this.value.toLowerCase());
  }
  scrollBottom();
});

ti.addEventListener('keydown', function (e) {
  if (e.key === 'Enter') {
    handleEnter(this.value.trim());
  }
  // Caps lock warning
  if (loginState === 'username' && e.getModifierState && e.getModifierState('CapsLock') && !ti.dataset.capsWarned) {
    ti.dataset.capsWarned = '1';
    tmpLine('> WARNING: CAPS LOCK IS ON. YOU ARE YELLING. please calm down.', 'warn', 3000);
    setTimeout(function () { ti.dataset.capsWarned = ''; }, 4000);
  }
});

// Keep focus on ti whenever the terminal is clicked
document.getElementById('term-wrap').addEventListener('click', function () {
  if (loginState === 'username' || loginState === 'password') ti.focus();
});

// ── State machine: Enter ─────────────────────────────────────
function handleEnter(val) {
  if (loginState === 'username') {
    // Echo the line
    addLine('station451 login: ' + val, 'normal');
    ti.value = '';
    document.getElementById('typed-display').textContent = '';

    if (!val) { ti.focus(); return; } // empty — just re-prompt

    // Check for terminal commands
    if (handleCommand(val)) { ti.focus(); return; }

    // Valid username — move to password
    enteredUsername = val;
    loginState = 'password';
    setTimeout(function () { showPrompt('Password: '); }, 80);

  } else if (loginState === 'password') {
    var pw = ti.value;
    addLine('Password: ', 'normal'); // never echo the password
    ti.value = '';
    document.getElementById('typed-display').textContent = '';
    il.style.display = 'none';
    loginState = 'done';
    doAuth(enteredUsername);
  }
}

// ── Auth + granted sequence ───────────────────────────────────
function doAuth(uname) {
  var rank = RANKS[Math.floor(Math.random() * RANKS.length)];

  var glines = [
    { t: '', d: 10 },
    { t: '─────────────────────────────────────────────────────', c: 'g-dim', d: 60 },
    { t: '> VERIFYING CREDENTIALS...', c: 'g-ok', d: 220 },
    { t: '> CHECKING SECTOR CLEARANCE...', c: 'g-ok', d: 300 },
    { t: '> SCANNING FOR HOSTILES...  NONE DETECTED.', c: 'g-ok', d: 360 },
    { t: '', d: 40 },
    { t: '  ✦  ACCESS GRANTED  ✦', c: 'g-yellow', d: 260 },
    { t: '', d: 30 },
    { t: '  WELCOME, ' + rank + ' ' + uname.toUpperCase(), c: 'g-bright', d: 140 },
    { t: '  RANK ASSIGNED : ' + rank, c: 'g-ok', d: 100 },
    { t: '  CLEARANCE     : LEVEL 3 — VISITOR', c: 'g-ok', d: 100 },
    { t: '', d: 40 },
    { t: '  Initializing station interface...', c: 'g-dim', d: 120 },
  ];

  var gi = 0;
  function nextGranted() {
    if (gi >= glines.length) {
      var pw = document.createElement('div');
      pw.className = 'prog-wrap';
      var pf = document.createElement('div');
      pf.className = 'prog-fill';
      pw.appendChild(pf);
      log.appendChild(pw);
      scrollBottom();
      setTimeout(function () { pf.style.width = '100%'; }, 50);
      setTimeout(function () {
        localStorage.setItem('xb_username', uname);
        localStorage.setItem('xb_rank', rank);
        window.location.replace('index.html');
      }, 1400);
      return;
    }
    var l = glines[gi++];
    var el = document.createElement('div');
    el.className = l.c || '';
    el.textContent = l.t;
    log.appendChild(el);
    scrollBottom();
    setTimeout(nextGranted, l.d || 80);
  }

  nextGranted();
}

// ============================================================
//  EASTER EGGS
// ============================================================

// ── TERMINAL COMMAND EMULATOR ────────────────────────────────
var FORTUNES = [
  "The stars have aligned. Unfortunately they spelled 'go home'.",
  "You will meet a stranger with a very good screenname.",
  "The firewall is not real. Nothing here is real. This fortune is real.",
  "Lucky numbers: 42, 1337, 9000, and E=mc².",
  "A great DM once said: 'are you SURE you want to do that?'",
  "Sector 7-Gamma has nothing in it. This IS the fortune.",
  "Someone has been clicking [OK] when it was barely [OK]. You know who you are.",
  "The terminal always remembers. The terminal forgets nothing.",
  "Your astrophoto will come out slightly blurry. Stack more frames.",
  "Today is a good day to sign the guestbook.",
  "There is a secret.txt. You already know what to do."
];

function handleCommand(raw) {
  var cmd = raw.trim().toLowerCase();
  var first = cmd.split(' ')[0];
  var KNOWN = ['help','ls','dir','whoami','fortune','ping','cat','sudo','rm','hack','matrix',
               'clear','reboot','exit','logout','quit','status','date','uname','man','wget',
               'curl','python','git','npm','cd','mkdir','touch','echo'];
  if (KNOWN.indexOf(first) === -1) return false;

  if (cmd === 'help' || cmd === '/?') {
    seqLines([
      { t: '> ── STATION 451 TERMINAL  v2.1 ─── AVAILABLE COMMANDS ─', c: 'dim' },
      { t: '>   help       — you already know what this does', c: 'ok' },
      { t: '>   ls / dir   — list station files', c: 'ok' },
      { t: '>   whoami     — existential inquiry', c: 'ok' },
      { t: '>   fortune    — ancient cosmic wisdom', c: 'ok' },
      { t: '>   ping       — check if the internet exists', c: 'ok' },
      { t: '>   cat        — read a file  (try: cat secret.txt)', c: 'ok' },
      { t: '>   sudo       — probably not', c: 'ok' },
      { t: '>   rm -rf /   — please do not', c: 'ok' },
      { t: '>   hack       — [CLASSIFIED]', c: 'ok' },
      { t: '>   matrix     — [CLASSIFIED]', c: 'ok' },
      { t: '>   reboot     — reboot this terminal', c: 'ok' },
      { t: '>   clear      — clear the log', c: 'ok' },
      { t: '>   exit       — (this does nothing. you cannot leave.)', c: 'ok' },
      { t: '>   status     — current system status', c: 'ok' },
      { t: '> ── end of help ────────────────────────────────────', c: 'dim' },
    ], 60);

  } else if (cmd === 'ls' || cmd === 'dir' || cmd === 'ls -la' || cmd === 'ls -l') {
    seqLines([
      { t: '> total 42', c: 'dim' },
      { t: '> drwxr-xr-x  thane_photos/            (22 files, mostly good)', c: 'ok' },
      { t: '> drwxr-xr-x  dnd_campaign/            (wiki: 847 entries, growing)', c: 'ok' },
      { t: '> drwxr-xr-x  research/                (agn data. do NOT delete.)', c: 'ok' },
      { t: '> -rw-r--r--  thane-goetz.neocities.org (you are currently inside this)', c: 'ok' },
      { t: '> -rw-r--r--  star_trek_rankings.xlsx  (opinions may be controversial)', c: 'ok' },
      { t: '> -rw-r--r--  todo.txt                 (do not open. it is too long.)', c: 'ok' },
      { t: '> -rw-r--r--  secret.txt               (cat secret.txt)', c: 'warn' },
      { t: '> -rw-------  passwords.txt            (wait—)', c: 'warn' },
      { t: '> -rw-------  passwords.txt.bak        (oh no)', c: 'warn' },
    ], 80);

  } else if (cmd === 'whoami' || cmd === 'who am i') {
    seqLines([
      { t: '> ── IDENTITY SCAN ──────────────────────────────────', c: 'dim' },
      { t: '> user       : [VISITOR — UNCLASSIFIED]', c: 'ok' },
      { t: '> location   : [REDACTED BY REQUEST]', c: 'ok' },
      { t: '> species    : human (probably)', c: 'ok' },
      { t: '> threat lvl : 2 / 10  (mostly harmless)', c: 'ok' },
      { t: '> last seen  : right now. hi.', c: 'ok' },
      { t: '> notes      : seems curious. allow entry.', c: 'dim' },
      { t: '> ── end scan ────────────────────────────────────────', c: 'dim' },
    ], 120);

  } else if (cmd === 'fortune') {
    var f = FORTUNES[Math.floor(Math.random() * FORTUNES.length)];
    seqLines([
      { t: '> ── fortune ────────────────────────────────────────', c: 'dim', d: 100 },
      { t: '>   ' + f, c: 'warn', d: 200 },
      { t: '> ────────────────────────────────────────────────────', c: 'dim', d: 100 },
    ]);

  } else if (first === 'ping') {
    var tgt = cmd.replace('ping', '').trim() || 'deep-space-relay.sector7.gamma';
    addLine('> PING ' + tgt + ' — 4 packets transmitted', 'ok');
    [12, 14, 9999, Infinity].forEach(function (t, i) {
      setTimeout(function () {
        var ts = t === Infinity ? '∞' : t + 'ms';
        addLine('> 64 bytes from ' + tgt + ': icmp_seq=' + (i+1) + ' ttl=64 time=' + ts, t > 100 ? 'warn' : 'ok');
        if (i === 3) setTimeout(function () {
          addLine('> ── 2 packets transmitted, 2 received, 2 mysteriously lost. space is large. ──', 'dim');
        }, 200);
      }, (i + 1) * 320);
    });

  } else if (first === 'cat') {
    var fname = cmd.replace('cat', '').trim();
    if (fname === 'secret.txt') {
      seqLines([
        { t: '> ── cat secret.txt ─────────────────────────────────', c: 'dim' },
        { t: "> Science Officer Thane's actual password: it was pizza. it was always pizza.", c: 'ok' },
        { t: '> xenoshield firewall is an 88x31 gif of a padlock.', c: 'ok' },
        { t: '> sector 7-gamma: JP checked again. still nothing. he keeps checking.', c: 'ok' },
        { t: '> there is a 7th page of this website. you will never find it.', c: 'ok' },
        { t: '> you found this file. this means something. probably.', c: 'warn' },
        { t: '> ── end of file ─────────────────────────────────────', c: 'dim' },
      ], 140);
    } else if (fname === 'todo.txt') {
      seqLines([
        { t: '> ── cat todo.txt ────────────────────────────────────', c: 'dim' },
        { t: '> [x] launch Station 451 (est. 2025)', c: 'dim' },
        { t: '> [x] create guestbook', c: 'dim' },
        { t: '> [ ] upload astrophotos (scanner still broken, still)', c: 'ok' },
        { t: '> [ ] find out what is in sector 7-gamma', c: 'ok' },
        { t: '> [ ] fix xenoshield (get better gif)', c: 'ok' },
        { t: '> [ ] session 7 prep (they WILL do something stupid)', c: 'ok' },
        { t: '> [ ] reply to dr_pope on SpaceHey (unread since forever)', c: 'ok' },
        { t: '> [ ] delete passwords.txt', c: 'warn' },
        { t: '> [ ] delete passwords.txt.bak', c: 'warn' },
        { t: '> [?] figure out what the 7th page is', c: 'warn' },
        { t: '> ── end of file ─────────────────────────────────────', c: 'dim' },
      ], 120);
    } else if (fname === 'passwords.txt' || fname === 'passwords.txt.bak') {
      addLine('> cat: ' + fname + ': permission denied.  nice try.', 'alert');
    } else if (fname === '') {
      addLine('> cat: usage: cat <filename>   (try: cat secret.txt)', 'dim');
    } else {
      addLine('> cat: ' + fname + ': no such file.  (ls to see what exists)', 'dim');
    }

  } else if (cmd === 'sudo make me a sandwich') {
    seqLines([
      { t: '> checking sudo privileges...', c: 'ok', d: 300 },
      { t: '> [sudo] password for visitor:', c: 'warn', d: 600 },
      { t: '> okay, fine.', c: 'ok', d: 400 },
      { t: '> 🥪 sandwich.exe initialized. delivery eta: unknown.', c: 'ok', d: 300 },
    ]);

  } else if (first === 'sudo') {
    addLine('> sudo: command not recognized on a neocities website. please.', 'alert');

  } else if (cmd === 'rm -rf /' || cmd === 'rm -rf' || cmd === 'rm -rf *') {
    seqLines([
      { t: '> !! WARNING: this will delete everything !!', c: 'alert', d: 200 },
      { t: '> deleting /boot/ ...           done', c: 'warn', d: 400 },
      { t: '> deleting /home/jp/ ...        done', c: 'warn', d: 400 },
      { t: '> deleting /var/www/ ...        done', c: 'warn', d: 400 },
      { t: '> deleting /etc/ ...            done', c: 'warn', d: 400 },
      { t: '> deleting /dev/hope ...        done', c: 'warn', d: 500 },
      { t: '> deleting /dev/dreams ...      done', c: 'warn', d: 500 },
      { t: '> ...', c: 'dim', d: 600 },
      { t: '> just kidding. nothing was deleted. this is a website.', c: 'ok', d: 400 },
    ]);

  } else if (first === 'rm') {
    addLine('> rm: ' + cmd.replace('rm', '').trim() + ': no such file  (there are no real files here)', 'dim');

  } else if (cmd === 'matrix') {

    setTimeout(startMatrix, 600);

  } else if (cmd === 'clear') {
    log.innerHTML = '';

  } else if (cmd === 'reboot') {
    addLine('> rebooting...', 'warn');
    setTimeout(function () {
      log.innerHTML = '';
      il.style.display = 'none';
      loginState = 'booting';
      enteredUsername = '';
      li = 0;
      setTimeout(nextLine, 500);
    }, 700);

  } else if (cmd === 'exit' || cmd === 'logout' || cmd === 'quit') {
    addLine('> logout: you cannot leave. you have not even logged IN yet.', 'warn');

  } else if (cmd === 'status' || cmd === 'systemctl status') {
    seqLines([
      { t: '> ── STATION 451  SYSTEM STATUS ─────────────────────', c: 'dim' },
      { t: '> uptime         : since 2025 (mostly)', c: 'ok' },
      { t: '> firewall       : [ACTIVE] (an 88x31 gif. but still.)', c: 'warn' },
      { t: '> sector 7-gamma : empty. still empty. checked again.', c: 'ok' },
      { t: '> guestbook      : open for business', c: 'ok' },
      { t: '> star charts    : loaded (very dramatic)', c: 'ok' },
      { t: '> coffee supply  : CRITICALLY LOW', c: 'alert' },
      { t: '> d&d campaign   : session 3 this friday', c: 'ok' },
      { t: '> scanner        : still broken (see: todo.txt)', c: 'warn' },
      { t: '> ── all systems: nominal (approximately) ────────────', c: 'dim' },
    ], 80);

  } else if (cmd === 'date') {
    addLine('> ' + new Date().toString(), 'ok');

  } else if (cmd === 'uname' || cmd === 'uname -a') {
    addLine('> XenoOS 2.1 SECTOR7-GAMMA Station451 #1 SMP 1999 x86 i-love-space GNU/Linux', 'ok');

  } else if (first === 'man') {
    var topic = cmd.replace('man', '').trim();
    addLine('> man: no manual entry for "' + (topic || '???') + '". consider just guessing.', 'dim');

  } else if (first === 'cd') {
    var path = cmd.replace('cd', '').trim();
    if (path === '..' || path === '../') {
      addLine('> cd: cannot leave station. all routes lead back here.', 'dim');
    } else {
      addLine('> cd: ' + (path || '~') + ': you are already as deep as you can go.', 'dim');
    }

  } else if (first === 'python' || first === 'python3') {
    seqLines([
      { t: '> Python 3.11.0 (Station 451 build) — Type "help" for more info.', c: 'ok', d: 200 },
      { t: '> >>>', c: 'dim', d: 300 },
      { t: '> just kidding. there is no python here. this is a login screen.', c: 'dim', d: 400 },
    ]);

  } else if (first === 'git') {
    addLine('> fatal: not a git repository (or any of the parent directories)', 'alert');

  } else if (first === 'wget' || first === 'curl') {
    addLine('> ' + first + ': what would you even download from a login screen', 'dim');

  } else if (first === 'npm') {
    addLine('> npm: this terminal does not have node_modules. you are safe here.', 'ok');

  } else if (first === 'echo') {
    var echoed = cmd.replace('echo', '').trim().replace(/^["']|["']$/g, '');
    addLine('> ' + (echoed || ''), 'ok');

  } else {
    addLine('> ' + first + ': command not found.  type "help" for available commands.', 'alert');
  }

  return true;
}

// ── MATRIX RAIN ──────────────────────────────────────────────
var matrixActive = false;
function startMatrix() {
  if (matrixActive) return;
  matrixActive = true;
  var canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;top:0;left:0;z-index:9999;cursor:crosshair;';
  document.body.appendChild(canvas);
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  var ctx = canvas.getContext('2d');
  var fs = 14;
  var cols = Math.floor(canvas.width / fs);
  var drops = [];
  for (var i = 0; i < cols; i++) drops[i] = Math.random() * -50;
  addLine('> MATRIX PROTOCOL ACTIVE — click screen to exit', 'warn');
  var fid;
  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff00';
    ctx.font = fs + 'px Share Tech Mono, monospace';
    for (var j = 0; j < drops.length; j++) {
      ctx.fillText(String.fromCharCode(33 + Math.floor(Math.random() * 94)), j * fs, drops[j] * fs);
      if (drops[j] * fs > canvas.height && Math.random() > 0.975) drops[j] = 0;
      drops[j]++;
    }
    fid = requestAnimationFrame(draw);
  }
  draw();
  function stop() {
    matrixActive = false;
    cancelAnimationFrame(fid);
    if (canvas.parentNode) canvas.parentNode.removeChild(canvas);
  }
  canvas.addEventListener('click', stop);
  setTimeout(stop, 12000);
}

// ── DVD SCREENSAVER (30s idle) ────────────────────────────────
var ssTimer, ssActive = false, ssFid;
function resetIdle() {
  clearTimeout(ssTimer);
  if (ssActive) stopSS();
  ssTimer = setTimeout(startSS, 30000);
}
function startSS() {
  ssActive = true;
  var ov = document.createElement('div');
  ov.id = 'ss';
  ov.style.cssText = 'position:fixed;inset:0;background:#000;z-index:9998;overflow:hidden;';
  var txt = document.createElement('div');
  txt.style.cssText = 'position:absolute;font-family:"VT323",monospace;font-size:52px;white-space:nowrap;user-select:none;left:100px;top:100px;';
  txt.textContent = '✦ STATION 451 ✦';
  var sub = document.createElement('div');
  sub.style.cssText = 'position:fixed;bottom:14px;left:50%;transform:translateX(-50%);color:#0a1a0a;font-size:11px;font-family:"Share Tech Mono",monospace;white-space:nowrap;';
  sub.textContent = '[ move mouse or press any key to wake terminal ]';
  ov.appendChild(txt); ov.appendChild(sub);
  document.body.appendChild(ov);
  var x = 100, y = 100, vx = 2, vy = 1.3;
  var palette = ['#00ff00', '#00ccff', '#ff66ff', '#ffff00', '#ff6600', '#00ffcc', '#ff4444'];
  var ci = 0;
  txt.style.color = palette[0];
  function bounce() {
    if (!ssActive) return;
    x += vx; y += vy;
    var mxX = window.innerWidth  - txt.offsetWidth  - 8;
    var mxY = window.innerHeight - txt.offsetHeight - 8;
    if (x <= 0 || x >= mxX) { vx = -vx; x = Math.max(0, Math.min(x, mxX)); txt.style.color = palette[++ci % palette.length]; }
    if (y <= 0 || y >= mxY) { vy = -vy; y = Math.max(0, Math.min(y, mxY)); txt.style.color = palette[++ci % palette.length]; }
    txt.style.left = x + 'px'; txt.style.top = y + 'px';
    ssFid = requestAnimationFrame(bounce);
  }
  bounce();
}
function stopSS() {
  ssActive = false;
  cancelAnimationFrame(ssFid);
  var el = document.getElementById('ss');
  if (el) el.parentNode.removeChild(el);
  resetIdle();
}
['mousemove', 'keydown', 'click', 'touchstart'].forEach(function (ev) {
  document.addEventListener(ev, resetIdle, { passive: true });
});
resetIdle();
